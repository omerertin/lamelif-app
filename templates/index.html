<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lamelif Ürün Görsel Bulucu</title>
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    .panel {
      background: rgba(17,24,39,.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { color: var(--muted); line-height: 1.45; }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }
    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      font-size: 18px;
      text-transform: uppercase;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 16px 18px;
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
      font-size: 16px;
    }
    .hint { font-size: 14px; margin-top: 10px; }
    .status {
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.error { background: rgba(239,68,68,.12); color: #fecaca; border: 1px solid rgba(239,68,68,.35); }
    .status.info { background: rgba(34,197,94,.12); color: #dcfce7; border: 1px solid rgba(34,197,94,.35); }
    .grid {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }
    .result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .imgbox {
      background: #fff;
      aspect-ratio: 4 / 5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .imgbox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .content { padding: 14px; }
    .title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .meta { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(34,197,94,.16);
      color: #bbf7d0;
      margin-bottom: 10px;
    }
    @media (max-width: 600px) {
      form { grid-template-columns: 1fr; }
      button { width: 100%; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Lamelif Ürün Görsel Bulucu</h1>
      <p>Depoda ürün kodunu yaz. Sistem önce Lamelif ürün sayfasını bulur, sonra görseli getirir. Telefon ekranından ürünle karşılaştırırsın.</p>
      <form id="searchForm">
        <input id="codeInput" name="code" placeholder="Örn: DNM0520" autocomplete="off" autocapitalize="characters" enterkeyhint="search">
        <button type="submit">Görseli Bul</button>
      </form>
      <div class="hint">İpucu: Kodlar boşluksuz ve büyük harfle daha iyi sonuç verir.</div>
      <div id="status" class="status"></div>
    </div>

    <div id="results" class="grid"></div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('codeInput');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    function setStatus(message, type = 'info') {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderResults(code, results) {
      resultsEl.innerHTML = '';
      if (!results.length) {
        setStatus(`${code} için görsel bulunamadı.`, 'error');
        return;
      }
      clearStatus();
      results.forEach((item, index) => {
        const card = document.createElement('article');
        card.className = 'result';
        card.innerHTML = `
          <div class="imgbox">
            ${item.image_url ? `<img src="${item.image_url}" alt="${escapeHtml(item.title)}" loading="${index === 0 ? 'eager' : 'lazy'}">` : `<div>Görsel yok</div>`}
          </div>
          <div class="content">
            ${item.matched_code ? '<div class="badge">Kod eşleşti</div>' : '<div class="badge">Yakın sonuç</div>'}
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="meta">Kaynak: ${escapeHtml(item.source)}</div>
            <div class="actions">
              <a href="${item.page_url}" target="_blank" rel="noopener noreferrer">Ürün sayfasını aç</a>
              ${item.image_url ? `<a href="${item.image_url}" target="_blank" rel="noopener noreferrer">Görseli aç</a>` : ''}
            </div>
          </div>
        `;
        resultsEl.appendChild(card);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = input.value.trim().toUpperCase();
      if (!code) {
        setStatus('Lütfen ürün kodu gir.', 'error');
        return;
      }

      setStatus(`${code} aranıyor...`, 'info');
      resultsEl.innerHTML = '';

      try {
        const res = await fetch(`/api/search?code=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'Arama başarısız oldu.');
        }
        renderResults(data.code, data.results || []);
      } catch (err) {
        setStatus(err.message || 'Bir hata oluştu.', 'error');
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
