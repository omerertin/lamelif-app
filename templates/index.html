<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamelif Ürün Bulucu</title>
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="/manifest.json">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }
        .wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 8px;
        }
        .muted {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 14px;
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            padding: 14px 18px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .msg {
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 15px;
        }
        .info { background: #e0f2fe; color: #075985; }
        .warn { background: #fff7ed; color: #9a3412; }
        .err  { background: #fef2f2; color: #991b1b; }
        .ok   { background: #ecfdf5; color: #065f46; }
        .result-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            margin-top: 16px;
        }
        .result-card img {
            width: 100%;
            display: block;
            background: #f9fafb;
        }
        .result-body {
            padding: 14px;
        }
        .result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.35;
        }
        .meta {
            font-size: 14px;
            color: #374151;
            margin: 4px 0;
        }
        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 6px;
            margin-top: 6px;
        }
        .tag-live { background: #dcfce7; color: #166534; }
        .tag-cache { background: #dbeafe; color: #1d4ed8; }
        .tag-manual { background: #f3e8ff; color: #7e22ce; }
        .tag-other { background: #e5e7eb; color: #374151; }
        a.link {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }
        pre.debug {
            white-space: pre-wrap;
            word-break: break-word;
            background: #111827;
            color: #f9fafb;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            overflow: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Lamelif Ürün Bulucu</h1>
            <div class="muted">Ürün kodunu yaz, kayıtlıysa ya da bulunabiliyorsa görseli getirilsin.</div>

            <div class="search-row">
                <input
                    type="text"
                    id="code"
                    placeholder="Örn: BT4616"
                    autocomplete="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    onkeydown="if(event.key==='Enter'){searchProduct();}"
                >
                <button id="searchBtn" onclick="searchProduct()">Ara</button>
            </div>

            <div id="message"></div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        async function searchProduct() {
            const input = document.getElementById("code");
            const btn = document.getElementById("searchBtn");
            const messageBox = document.getElementById("message");
            const resultsBox = document.getElementById("results");

            const code = input.value.trim().toUpperCase();

            resultsBox.innerHTML = "";
            messageBox.innerHTML = "";

            if (!code) {
                showMessage("Lütfen ürün kodu gir.", "warn");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Aranıyor...";
            showMessage("Arama yapılıyor...", "info");

            try {
                const response = await fetch("/api/search?code=" + encodeURIComponent(code));
                const rawText = await response.text();

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (jsonErr) {
                    showMessage("Sunucudan JSON yerine farklı bir cevap geldi.", "err");
                    resultsBox.innerHTML = `
                        <div class="card">
                            <b>Ham cevap:</b>
                            <pre class="debug">${escapeHtml(rawText)}</pre>
                        </div>
                    `;
                    return;
                }

                if (!response.ok) {
                    showMessage(data.error || "Sunucu hatası oluştu.", "err");
                    return;
                }

                if (data.results && data.results.length > 0) {
                    const fromCache = data.from_cache === true;
                    const sourceText = fromCache ? "Kayıtlı görseller gösteriliyor." : "Yeni sonuç bulundu.";
                    showMessage(sourceText, fromCache ? "ok" : "info");

                    renderResults(data.results, data.product_name || "");
                    return;
                }

                if (data.product_name) {
                    showMessage(
                        `${escapeHtml(data.code)} katalogda var. Ürün adı: ${escapeHtml(data.product_name)}. ` +
                        `${escapeHtml(data.message || "Ama görsel henüz bulunamadı.")}`,
                        "warn"
                    );
                    return;
                }

                showMessage(data.message || "Sonuç bulunamadı.", "warn");

            } catch (err) {
                showMessage("İstek sırasında hata oluştu: " + escapeHtml(err.message), "err");
            } finally {
                btn.disabled = false;
                btn.textContent = "Ara";
            }
        }

        function renderResults(results, productName) {
            const resultsBox = document.getElementById("results");
            resultsBox.innerHTML = "";

            results.forEach(item => {
                const source = (item.source || "").toLowerCase();
                const tagClass = getTagClass(source);

                const card = document.createElement("div");
                card.className = "result-card";

                card.innerHTML = `
                    ${item.image_url ? `<img src="${escapeAttr(item.image_url)}" alt="${escapeAttr(item.title || item.code || 'Ürün görseli')}">` : ""}
                    <div class="result-body">
                        <div class="result-title">${escapeHtml(item.title || productName || item.code || "Ürün")}</div>
                        <div class="meta"><b>Kod:</b> ${escapeHtml(item.code || "-")}</div>
                        ${productName ? `<div class="meta"><b>Katalog adı:</b> ${escapeHtml(productName)}</div>` : ""}
                        <div class="meta">
                            <span class="tag ${tagClass}">${escapeHtml(item.source || "bilinmiyor")}</span>
                        </div>
                        ${item.page_url ? `<a class="link" href="${escapeAttr(item.page_url)}" target="_blank" rel="noopener noreferrer">Ürün sayfasını aç</a>` : ""}
                    </div>
                `;

                resultsBox.appendChild(card);
            });
        }

        function getTagClass(source) {
            if (source.includes("manual")) return "tag-manual";
            if (source.includes("cache")) return "tag-cache";
            if (source.includes("live")) return "tag-live";
            return "tag-other";
        }

        function showMessage(text, type) {
            const messageBox = document.getElementById("message");
            messageBox.innerHTML = `<div class="msg ${type}">${text}</div>`;
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttr(str) {
            return escapeHtml(str);
        }
    </script>
</body>
</html>
