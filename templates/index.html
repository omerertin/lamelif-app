<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamelif Ürün Bulucu</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
        .card { background:#fff; border-radius:14px; padding:16px; margin-bottom:16px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
        .row { display:flex; gap:8px; }
        input { flex:1; padding:14px; font-size:16px; border:1px solid #ccc; border-radius:10px; }
        button { padding:14px 18px; border:0; background:#111827; color:#fff; border-radius:10px; font-size:16px; }
        .msg { margin-top:12px; padding:12px; border-radius:10px; }
        .ok { background:#ecfdf5; color:#065f46; }
        .warn { background:#fff7ed; color:#9a3412; }
        .err { background:#fef2f2; color:#991b1b; }
        .item { background:#fff; border-radius:14px; padding:14px; margin-top:14px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
        .title { font-weight:700; font-size:18px; margin-bottom:8px; }
        .meta { font-size:14px; margin:4px 0; color:#374151; }
        pre { white-space:pre-wrap; word-break:break-word; background:#111827; color:#fff; padding:12px; border-radius:10px; }
        @media (max-width: 640px){ .row { flex-direction:column; } button { width:100%; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h2>Lamelif Ürün Bulucu</h2>
            <div class="row">
                <input id="code" placeholder="Örn: BT4616" onkeydown="if(event.key==='Enter') searchProduct()">
                <button id="btn" onclick="searchProduct()">Ara</button>
            </div>
            <div id="message"></div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        async function searchProduct() {
            const code = document.getElementById("code").value.trim().toUpperCase();
            const btn = document.getElementById("btn");
            const message = document.getElementById("message");
            const results = document.getElementById("results");

            message.innerHTML = "";
            results.innerHTML = "";

            if (!code) {
                message.innerHTML = '<div class="msg warn">Kod gir.</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = "Aranıyor...";

            try {
                const res = await fetch("/api/search?code=" + encodeURIComponent(code));
                const text = await res.text();

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    message.innerHTML = '<div class="msg err">JSON yerine başka cevap geldi.</div>';
                    results.innerHTML = "<pre>" + escapeHtml(text) + "</pre>";
                    return;
                }

                if (!res.ok) {
                    message.innerHTML = '<div class="msg err">' + escapeHtml(data.error || "Hata") + '</div>';
                    return;
                }

                if (!data.found_in_catalog) {
                    message.innerHTML = '<div class="msg warn">' + escapeHtml(data.message || "Kod yok") + '</div>';
                    return;
                }

                message.innerHTML = '<div class="msg ok">' + escapeHtml(data.message || "Bulundu") + '</div>';

                (data.results || []).forEach(item => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `
                        <div class="title">${escapeHtml(item.product_name || item.code)}</div>
                        <div class="meta"><b>Kod:</b> ${escapeHtml(item.code || "")}</div>
                        <div class="meta"><b>Ürün ID:</b> ${escapeHtml(item.product_id || "")}</div>
                        <div class="meta"><b>Kategori:</b> ${escapeHtml(item.category_name || "")}</div>
                        <div class="meta"><b>Fiyat:</b> ${escapeHtml(item.price || "")}</div>
                        <div class="meta"><b>Renk:</b> ${escapeHtml(item.color || "")}</div>
                        <div class="meta"><b>Beden:</b> ${escapeHtml(item.size || "")}</div>
                        <div class="meta"><b>Barkod:</b> ${escapeHtml(item.barcode || "")}</div>
                        <div class="meta"><b>Stok:</b> ${escapeHtml(item.stock || "")}</div>
                    `;
                    results.appendChild(div);
                });

            } catch (err) {
                message.innerHTML = '<div class="msg err">' + escapeHtml(err.message) + '</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = "Ara";
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>
</body>
</html>
